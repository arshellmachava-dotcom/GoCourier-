<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>GoCourier • Verificação</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    body { 
      background: #000000; 
      color: #ffffff; 
      min-height: 100vh;
    }

    .glass {
      background: rgba(20, 20, 30, 0.6);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .upload-box {
      background: rgba(0, 0, 0, 0.4);
      border: 2px dashed rgba(255, 255, 255, 0.1);
      border-radius: 1.5rem;
      transition: all 0.3s ease;
      cursor: pointer;
      aspect-ratio: 1/0.8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .upload-box:hover {
      border-color: rgba(255, 255, 255, 0.3);
      background: rgba(30, 30, 40, 0.6);
    }

    .upload-box.has-image {
      border: 2px solid rgba(76, 175, 80, 0.5);
    }

    .upload-preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }

    .upload-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .upload-box:hover .upload-overlay {
      opacity: 1;
    }

    .upload-icon {
      font-size: 2.5rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .input-field {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.2rem;
      padding: 1rem 1.5rem;
      color: white;
      width: 100%;
    }

    .input-field:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn-primary {
      background: white;
      color: black;
      border: none;
      border-radius: 3rem;
      padding: 1.2rem;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      width: 100%;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 1rem;
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #333;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .badge.warning {
      background: rgba(255, 170, 0, 0.2);
      color: #ffaa00;
      border: 1px solid rgba(255, 170, 0, 0.3);
      padding: 0.25rem 0.75rem;
      border-radius: 2rem;
      font-size: 0.75rem;
    }

    .error-message {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid #ff4444;
      color: #ff8888;
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid #4caf50;
      color: #88ff88;
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
      display: none;
    }

    .success-message.show {
      display: block;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Loading -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <p class="text-gray-400">Enviando documentos...</p>
  </div>

  <!-- Header -->
  <header class="glass sticky top-0 z-40 p-6 border-b border-white/5 flex items-center gap-4">
    <button onclick="voltar()" class="text-2xl text-gray-400 hover:text-white">
      <i class="fas fa-arrow-left"></i>
    </button>
    <img src="ei_1773419339504-removebg-preview.png" alt="GoCourier" class="h-16 w-auto" />
    <h1 class="text-2xl font-bold flex-1">Verificação</h1>
    <span class="badge warning">
      <i class="fas fa-clock mr-1"></i>Pendente
    </span>
  </header>

  <!-- Main Content -->
  <main class="flex-1 p-6 max-w-3xl mx-auto w-full pb-28">

    <!-- Mensagens -->
    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <!-- AVISO: De onde veio (debug) - pode remover depois -->
    <div class="text-xs text-gray-600 mb-2" id="origemDisplay"></div>

    <!-- BI Section -->
    <section class="glass rounded-2xl p-6 mb-6">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-3">
        <i class="fas fa-id-card text-2xl text-blue-400"></i>
        Bilhete de Identidade
      </h2>
      
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="upload-box" id="biFrenteBox" onclick="document.getElementById('biFrente').click()">
          <input type="file" id="biFrente" accept="image/*" class="hidden" onchange="previewImage(this, 'frentePreview', 'biFrenteBox')">
          <div id="frentePreview" class="w-full h-full flex flex-col items-center justify-center">
            <i class="fas fa-id-card upload-icon"></i>
            <p class="text-sm">Frente do BI</p>
          </div>
          <div class="upload-overlay">
            <i class="fas fa-camera mr-2"></i> Alterar
          </div>
        </div>

        <div class="upload-box" id="biVersoBox" onclick="document.getElementById('biVerso').click()">
          <input type="file" id="biVerso" accept="image/*" class="hidden" onchange="previewImage(this, 'versoPreview', 'biVersoBox')">
          <div id="versoPreview" class="w-full h-full flex flex-col items-center justify-center">
            <i class="fas fa-id-card upload-icon"></i>
            <p class="text-sm">Verso do BI</p>
          </div>
          <div class="upload-overlay">
            <i class="fas fa-camera mr-2"></i> Alterar
          </div>
        </div>
      </div>

      <div class="space-y-4">
        <input type="text" id="biNumero" placeholder="Número do BI" class="input-field" />
        <input type="text" id="nomeCompleto" placeholder="Nome completo" class="input-field" />
        <div class="grid grid-cols-2 gap-4">
          <input type="date" id="dataNascimento" class="input-field" />
          <select id="genero" class="input-field">
            <option value="">Gênero</option>
            <option value="M">Masculino</option>
            <option value="F">Feminino</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Selfie -->
    <section class="glass rounded-2xl p-6 mb-6">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-3">
        <i class="fas fa-user-circle text-2xl text-green-400"></i>
        Selfie com Documento
      </h2>
      
      <div class="upload-box w-full" id="selfieBox" onclick="document.getElementById('selfie').click()" style="aspect-ratio: 16/9;">
        <input type="file" id="selfie" accept="image/*" class="hidden" onchange="previewImage(this, 'selfiePreview', 'selfieBox')">
        <div id="selfiePreview" class="w-full h-full flex flex-col items-center justify-center">
          <i class="fas fa-camera-retro upload-icon text-5xl"></i>
          <p class="text-lg mt-4">Selfie</p>
        </div>
        <div class="upload-overlay">
          <i class="fas fa-camera mr-2"></i> Nova foto
        </div>
      </div>
    </section>

    <!-- Residência -->
    <section class="glass rounded-2xl p-6 mb-8">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-3">
        <i class="fas fa-home text-2xl text-purple-400"></i>
        Comprovativo de Residência
      </h2>
      
      <div class="upload-box w-full" id="residenciaBox" onclick="document.getElementById('residencia').click()" style="aspect-ratio: 16/9;">
        <input type="file" id="residencia" accept="image/*" class="hidden" onchange="previewImage(this, 'residenciaPreview', 'residenciaBox')">
        <div id="residenciaPreview" class="w-full h-full flex flex-col items-center justify-center">
          <i class="fas fa-file-alt upload-icon text-5xl"></i>
          <p class="text-lg mt-4">Comprovativo</p>
        </div>
        <div class="upload-overlay">
          <i class="fas fa-camera mr-2"></i> Alterar
        </div>
      </div>
    </section>

    <!-- Termos -->
    <div class="flex items-center gap-3 mb-6">
      <input type="checkbox" id="terms" class="w-5 h-5 accent-white">
      <label for="terms" class="text-sm text-gray-400">
        Declaro que as informações são verdadeiras
      </label>
    </div>

    <!-- Botão -->
    <button class="btn-primary" id="submitBtn" onclick="enviarVerificacao()">
      <i class="fas fa-paper-plane mr-2"></i>
      Enviar para Verificação
    </button>
  </main>

  <script>
    // ========== PEGAR A PÁGINA DE ORIGEM (QUALQUER UMA) ==========
    const origem = document.referrer || 'entregas.html';
    
    // Mostrar de onde veio (para debug)
    document.getElementById('origemDisplay').textContent = '🔙 Voltando para: ' + origem;

    let usuarioLogado = null;
    
    try {
      usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
    } catch (e) {
      console.log('Erro ao carregar usuário');
    }

    // ========== VOLTAR EXATAMENTE PARA ONDE VEIO ==========
    function voltar() {
      // Se tem uma página de origem, volta para ela
      if (origem && origem !== '') {
        window.location.href = origem;
      } else {
        // Fallback: se não tem origem, vai para entregas.html
        window.location.href = 'entregas.html';
      }
    }

    // ========== FOTOS ==========
    let fotos = {
      biFrente: null,
      biVerso: null,
      selfie: null,
      residencia: null
    };

    function previewImage(input, previewId, boxId) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        
        reader.onload = function(e) {
          const preview = document.getElementById(previewId);
          const box = document.getElementById(boxId);
          
          box.classList.add('has-image');
          
          if (previewId === 'frentePreview') fotos.biFrente = e.target.result;
          else if (previewId === 'versoPreview') fotos.biVerso = e.target.result;
          else if (previewId === 'selfiePreview') fotos.selfie = e.target.result;
          else if (previewId === 'residenciaPreview') fotos.residencia = e.target.result;
          
          preview.innerHTML = `<img src="${e.target.result}" class="upload-preview">`;
        };
        
        reader.readAsDataURL(input.files[0]);
      }
    }

    // ========== VALIDAR ==========
    function validarFormulario() {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.classList.remove('show');
      
      if (!fotos.biFrente) { 
        errorDiv.textContent = 'Envie a frente do BI';
        errorDiv.classList.add('show');
        return false; 
      }
      if (!fotos.biVerso) { 
        errorDiv.textContent = 'Envie o verso do BI';
        errorDiv.classList.add('show');
        return false; 
      }
      if (!fotos.selfie) { 
        errorDiv.textContent = 'Envie sua selfie';
        errorDiv.classList.add('show');
        return false; 
      }
      if (!fotos.residencia) { 
        errorDiv.textContent = 'Envie comprovativo de residência';
        errorDiv.classList.add('show');
        return false; 
      }
      
      const campos = [
        document.getElementById('biNumero').value,
        document.getElementById('nomeCompleto').value,
        document.getElementById('dataNascimento').value,
        document.getElementById('genero').value
      ];
      
      if (campos.some(c => !c)) {
        errorDiv.textContent = 'Preencha todos os campos';
        errorDiv.classList.add('show');
        return false;
      }
      
      if (!document.getElementById('terms').checked) {
        errorDiv.textContent = 'Aceite os termos';
        errorDiv.classList.add('show');
        return false;
      }
      
      return true;
    }

    // ========== ENVIAR ==========
    function enviarVerificacao() {
      if (!validarFormulario()) return;
      if (!usuarioLogado) {
        alert('Usuário não encontrado. Faça login novamente.');
        window.location.href = 'login.html';
        return;
      }

      // Mostrar loading
      document.getElementById('loading').classList.add('active');
      document.getElementById('submitBtn').disabled = true;

      setTimeout(() => {
        try {
          // Criar verificação
          const verificacao = {
            id: Date.now(),
            usuarioId: usuarioLogado.id,
            nome: document.getElementById('nomeCompleto').value,
            biNumero: document.getElementById('biNumero').value,
            dataNascimento: document.getElementById('dataNascimento').value,
            genero: document.getElementById('genero').value,
            fotos: {
              // Não salvar imagens grandes
              enviadas: true
            },
            status: 'pendente',
            dataEnvio: new Date().toISOString()
          };
          
          // Salvar verificação
          let todas = JSON.parse(localStorage.getItem('verificacoes')) || [];
          todas.push(verificacao);
          localStorage.setItem('verificacoes', JSON.stringify(todas));
          
          // Atualizar usuário
          usuarioLogado.verificacaoStatus = 'pendente';
          usuarioLogado.verificacaoId = verificacao.id;
          localStorage.setItem('usuarioLogado', JSON.stringify(usuarioLogado));
          
          // Atualizar lista de usuários
          let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
          const index = usuarios.findIndex(u => u.id === usuarioLogado.id);
          if (index !== -1) {
            usuarios[index].verificacaoStatus = 'pendente';
            usuarios[index].verificacaoId = verificacao.id;
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
          }
          
          // Mostrar sucesso
          document.getElementById('successMessage').textContent = 'Documentos enviados com sucesso!';
          document.getElementById('successMessage').classList.add('show');
          
          // VOLTAR PARA ONDE VEIO APÓS 1 SEGUNDO
          setTimeout(() => {
            voltar(); // Volta exatamente para a página de origem
          }, 1000);
          
        } catch (error) {
          console.error('Erro:', error);
          document.getElementById('errorMessage').textContent = 'Erro ao enviar. Tente novamente.';
          document.getElementById('errorMessage').classList.add('show');
          document.getElementById('loading').classList.remove('active');
          document.getElementById('submitBtn').disabled = false;
        }
      }, 2000);
    }

    // ========== INICIAR ==========
    window.onload = function() {
      if (usuarioLogado && usuarioLogado.nome) {
        document.getElementById('nomeCompleto').value = usuarioLogado.nome;
      }
    };
  
  </script>
</body>
</html>
