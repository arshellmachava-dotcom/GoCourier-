<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoCourier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        /* Container da animação - FUNDO PRETO PURO */
        .splash-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000000; /* Preto puro */
        }

        /* Logo animado - TAMANHO AUMENTADO */
        .logo-wrapper {
            position: relative;
            width: 280px;  /* Aumentado de 180px para 280px */
            height: 280px; /* Aumentado de 180px para 280px */
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2)); /* Sombra branca suave */
            animation: pulse 2s ease-in-out infinite;
        }

        /* Círculos animados ao redor do logo - MAIORES TAMBÉM */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05); /* Branco transparente */
            animation: ripple 3s linear infinite;
        }

        .circle-1 {
            width: 350px;
            height: 350px;
            top: -35px;
            left: -35px;
            animation-delay: 0s;
        }

        .circle-2 {
            width: 420px;
            height: 420px;
            top: -70px;
            left: -70px;
            animation-delay: 1s;
            opacity: 0.03;
        }

        .circle-3 {
            width: 490px;
            height: 490px;
            top: -105px;
            left: -105px;
            animation-delay: 2s;
            opacity: 0.02;
        }

        /* Nome do app - SEM GRADIENTE */
        .app-name {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff; /* Branco puro */
            margin-bottom: 1rem;
            letter-spacing: 4px;
            animation: fadeInUp 1s ease-out;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Slogan */
        .slogan {
            color: #888888;
            font-size: 1rem;
            margin-bottom: 2rem;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        /* Barra de carregamento */
        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 2rem;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #ffffff; /* Branco puro */
            border-radius: 2px;
            animation: loading 2s ease-in-out forwards;
        }

        /* Animações */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.2); opacity: 0.05; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes loading {
            0% { width: 0%; }
            20% { width: 20%; }
            40% { width: 40%; }
            60% { width: 60%; }
            80% { width: 80%; }
            100% { width: 100%; }
        }

        /* Partículas flutuantes - BRANCAS */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }

        .particle-1 {
            top: 20%;
            left: 20%;
            animation: float 4s ease-in-out infinite;
        }

        .particle-2 {
            top: 70%;
            right: 20%;
            width: 6px;
            height: 6px;
            animation: float 5s ease-in-out infinite reverse;
        }

        .particle-3 {
            bottom: 30%;
            left: 30%;
            width: 3px;
            height: 3px;
            animation: float 3.5s ease-in-out infinite 0.5s;
        }

        .particle-4 {
            top: 40%;
            right: 30%;
            width: 5px;
            height: 5px;
            animation: float 4.5s ease-in-out infinite 0.2s;
        }

        .particle-5 {
            bottom: 20%;
            right: 40%;
            width: 4px;
            height: 4px;
            animation: float 6s ease-in-out infinite;
        }

        /* Mensagem de redirecionamento */
        .redirect-message {
            color: #666666;
            font-size: 0.8rem;
            margin-top: 1rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <!-- Partículas decorativas -->
        <div class="particle particle-1"></div>
        <div class="particle particle-2"></div>
        <div class="particle particle-3"></div>
        <div class="particle particle-4"></div>
        <div class="particle particle-5"></div>

        <!-- Logo com círculos animados - MAIOR -->
        <div class="logo-wrapper">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
            <img 
                src="ei_1773419339504-removebg-preview.png" 
                alt="GoCourier" 
                class="logo"
                onerror="this.src='https://via.placeholder.com/280x280/000/fff?text=GC';"
            />
        </div>

        <!-- Nome do app - SEM GRADIENTE -->
        <h1 class="app-name">GoCourier</h1>

        <!-- Slogan -->
        <p class="slogan">Entregas rápidas e seguras em Moçambique</p>

        <!-- Barra de progresso - BRANCA -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <!-- Mensagem de redirecionamento -->
        <p class="redirect-message">Preparando sua experiência...</p>
    </div>

    <script>
        // Redirecionar para login.html após a animação
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2500); // 2.5 segundos (tempo da animação)
    </script>
</body>
</html>
